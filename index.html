<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💖</title>
    <style>
        :root {
            --bg: #FFFF88;
            --border: #222;
            --pink: #FF66CC;
            --green: #A2FF00;
            --blue: #55CCFF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Decorative Floating Elements */
        .floating {
            position: fixed;
            z-index: -1;
            font-size: 2rem;
            animation: float 6s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* The Main Artwork Frame */
        .main-container {
            position: relative;
            animation: wiggle 4s infinite ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        .window-frame {
            width: 500px;
            height: 500px;
            border: 10px solid var(--border);
            border-radius: 40px;
            background-color: white;
            overflow: hidden;
            box-shadow: 20px 20px 0px var(--border);
            position: relative;
        }

        .photo-strip {
            display: flex;
            flex-direction: column;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .photo-frame {
            width: 500px;
            height: 500px;
            flex-shrink: 0;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Buttons & UI */
        .controls {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 18px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 5px solid var(--border);
            border-radius: 20px;
            box-shadow: 6px 6px 0px var(--border);
            transition: 0.2s;
            text-transform: uppercase;
        }

        #nextBtn { background: var(--green); color: var(--border); }
        #prevBtn { background: var(--blue); color: white; }

        button:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--border); }
        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Pop-up Apology Note */
        .apology-sticker {
            position: absolute;
            bottom: -30px;
            right: -50px;
            background: white;
            border: 4px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            width: 280px;
            box-shadow: 8px 8px 0px var(--pink);
            transform: rotate(5deg) scale(0);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .apology-sticker.show { transform: rotate(-5deg) scale(1); }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="floating" style="top:10%; left:10%;">⭐</div>
    <div class="floating" style="top:20%; right:15%; animation-delay: 1s;">💖</div>
    <div class="floating" style="bottom:15%; left:20%; animation-delay: 2s;">✨</div>

    <div class="main-container">
        <div class="window-frame">
            <div class="photo-strip" id="photoStrip">
                <div class="photo-frame"><img src="1.jpg"></div>
                <div class="photo-frame"><img src="2.jpg"></div>
                <div class="photo-frame"><img src="3.jpg"></div>
                <div class="photo-frame"><img src="4.jpg"></div>
                <div class="photo-frame"><img src="5.jpg"></div>
                <div class="photo-frame"><img src="6.jpg"></div>
            </div>
        </div>

        <div class="apology-sticker" id="note">
            <p style="margin:0; font-size: 1.1rem;">
                <strong>I'm so sorry...</strong><br>
                For hurting you sometimes. You're my favorite person in the whole world! 🐾💖
            </p>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">Back</button>
        <span id="counter" style="font-size: 1.5rem; font-weight: bold;">1 / 6</span>
        <button id="nextBtn">Next ✨</button>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const strip = document.getElementById('photoStrip');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const note = document.getElementById('note');
        const counter = document.getElementById('counter');
        const bgColors = ['#FFFF88', '#FFCCFF', '#CCFFFF', '#CCFFCC', '#FFD1B3', '#D1BBFF'];
        
        let index = 0;

        function update() {
            strip.style.transform = `translateY(-${index * 500}px)`;
            document.body.style.backgroundColor = bgColors[index];
            counter.innerText = `${index + 1} / 6`;
            
            prevBtn.disabled = index === 0;
            
            if (index === 5) {
                note.classList.add('show');
                nextBtn.innerText = "Love U! ❤️";
                startConfetti();
            } else {
                note.classList.remove('show');
                nextBtn.innerText = "Next ✨";
                nextBtn.disabled = false;
            }
        }

        nextBtn.addEventListener('click', () => {
            if (index < 5) { index++; update(); }
        });

        prevBtn.addEventListener('click', () => {
            if (index > 0) { index--; update(); }
        });

        // Simple Confetti Logic
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function startConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 5,
                    color: bgColors[Math.floor(Math.random() * bgColors.length)],
                    vel: Math.random() * 3 + 2
                });
            }
            animate();
        }

        function animate() {
            if (index !== 5) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.vel;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
